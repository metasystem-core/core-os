future_table_name: legal_quarantine_records
purpose: >
  Registro de quarentena de conteúdo jurídico suspeito ou de baixa confiança.
  Todo conteúdo com trust_class IN [TRUST-0, TRUST-1] DEVE ter um registro aqui (REGRA-02).
  Conteúdo em quarentena não alimenta RAG jurídico, não vira memória operacional e não
  sustenta conclusão jurídica. QUARENTENA ≠ REJEIÇÃO. TRUST-1 PODE SER PROMOVIDO. TRUST-0 É DEFINITIVO.

proposed_primary_key:
  column: quarantine_id
  type: uuid
  generated: "gen_random_uuid()"
  notes: "UUID v4. Imutável."

