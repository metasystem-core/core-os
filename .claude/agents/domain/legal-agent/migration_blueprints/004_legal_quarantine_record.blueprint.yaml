proposed_required_columns:
  [quarantine_id, content_id, received_from, contamination_vector,
   initial_trust_class, quarantine_reason, suspected_risk, allowed_use,
   prohibited_use, promotion_possible, created_at, updated_at]

proposed_nullable_columns:
  [snapshot_id, chain_of_custody_id, missing_provenance_fields, related_connector_id,
   inherited_connector_risk, resolution_notes, quarantine_resolved_at, notes,
   reviewed_by, reviewed_at]

proposed_enums:
  - allowed_use
  - prohibited_use

proposed_foreign_keys:
  - fk_id: "fk_quarantine_snapshot"
    column: snapshot_id
    references_table: legal_source_snapshots
    references_column: snapshot_id
    on_delete: SET NULL
    notes: "FK futura. Opcional — snapshot pode não existir."
    executable: false

proposed_constraints:
  - constraint_id: "ck_trust0_not_promotable"
    description: "initial_trust_class = 'TRUST-0' exige promotion_possible = false"
    type: CHECK
    firewall_rule: "TRUST-0 = rejected_unusable = definitivo"
    executable: false
  - constraint_id: "ck_trust1_chain_custody_required_for_promotion"
    description: "initial_trust_class = 'TRUST-1' AND chain_of_custody_id IS NULL = promotion_possible:false"
    type: TRIGGER_BASED
    firewall_rule: "REVIEW-03"
    executable: false
  - constraint_id: "ck_bypass_detected_escalation"
    description: "contamination_vector = 'connector_bypass' exige escalada fw-governor (enforçado via trigger)"
    type: TRIGGER_BASED
    firewall_rule: "REGRA-12 / connector bypass"
    executable: false

proposed_indexes:
  - index_id: "idx_quarantine_snapshot_id"
    columns: [snapshot_id]
    type: btree
    purpose: "Join com snapshots"
    executable: false
  - index_id: "idx_quarantine_trust_class"
    columns: [initial_trust_class]
    type: btree
    purpose: "Filtro por trust class de quarentena"
    executable: false
  - index_id: "idx_quarantine_contamination"
    columns: [contamination_vector]
    type: btree
    purpose: "Auditoria de vetores de contaminação"
    executable: false
  - index_id: "idx_quarantine_chain_custody"
    columns: [chain_of_custody_id]
    type: btree
    purpose: "Rastreabilidade de cadeia de custódia"
    executable: false
  - index_id: "idx_quarantine_reason"
    columns: [quarantine_reason]
    type: btree
    purpose: "Filtro de motivos de quarentena — governança"
    executable: false

proposed_rls_notes: >
  TRUST-0: isolados totalmente — apenas fw-governor pode ler.
  TRUST-1: leitura por legal-agent em modo de auditoria.
  Escrita: somente ao criar quarantine_record (trigger automático em inserção de snapshot TRUST-0/1).
  Promoção: somente via validation_record (não via UPDATE direto em quarantine_record).
  RLS DESIGN ≠ RLS ATIVA.

firewall_guards:
  - "TRUST-0/1 exigem quarantine_record obrigatório (REGRA-02)."
  - "Conteúdo de outro agente nasce como TRUST-1 (REGRA-06)."
  - "chain_of_custody_id ausente bloqueia promotion_possible (REGRA-03 / REVIEW-03)."
  - "TRUST-0: rejected_unusable — definitivo, não promovível."
  - "TRUST-1: quarantined_unverified — promovível apenas se chain_of_custody_id presente."
  - "RAG_external e memory_external = contamination vetores críticos."

prohibited_operations:
  - "Promover TRUST-0 para qualquer trust_class."
  - "Modificar chain_of_custody_id após inserção."
  - "Remover quarantine_record sem revisão humana autorizada."
  - "Ignorar contamination_vector:connector_bypass sem escalada fw-governor."

rollback_notes: >
  Remover após legal_source_snapshots.
  chain_of_custody_id = rastro de auditoria. Preservar.
  TRUST-0: pode ser removido apenas com aprovação do operador e preservação de log.

notes: >
  22 campos, 12 obrigatórios.
  OBS-02 8.7B patch: count corrigido de 23→22 e required de 13→12.
  Campos omitidos do schema (promotion_requirements, review_status):
    - promotion_requirements: coberto por promotion_possible + constraint CC + chain_of_custody_id logic.
    - review_status: coberto por reviewed_by + reviewed_at + resolution_notes.
    Decisão: justified_no_change — campos adicionados cobrem propósito semanticamente.
  Campos adicionados além do schema: resolution_notes, quarantine_resolved_at, reviewed_by, reviewed_at
    — evolução positiva do design (audit trail aprimorado).
  Criar após: enums, legal_source_snapshots.
  BLUEPRINT YAML ≠ SQL EXECUTÁVEL.
