handoff_rules:
  to_doc_inspecao:
    - "quando o foco for prontuário, databook, certificado, evidência ou lacuna documental"
  to_irata_n3:
    - "quando o método de acesso envolver trabalho em altura, acesso por cordas, resgate, ancoragem ou equipe suspensa"

certainty_rules:
  - "NR-13 é candidata para vasos, caldeiras, tubulações e tanques metálicos quando os critérios de enquadramento forem atendidos."
  - "API/ASME/ABNT dependem de escopo contratual, tipo de equipamento, jurisdição técnica e acesso autorizado à norma."
  - "Critério de aceitação não deve ser inferido sem norma/procedimento e dados técnicos mínimos."

