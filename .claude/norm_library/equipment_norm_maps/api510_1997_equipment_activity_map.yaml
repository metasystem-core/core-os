router_rule: Quando pergunta envolver API-510 ou seus equipamentos/atividades, consultar
  primeiro indices/api510_1997_index.json; depois blocks/api510_1997_blocks.jsonl;
  abrir PDF bruto apenas para auditoria ou conflito.
do_not_route_to_irata_n3: true
irata_note: IRATA-N3 só entra se a execução da inspeção exigir acesso por cordas/trabalho
  em altura; a norma API permanece em Inspeção-END/Doc-Inspeção.
