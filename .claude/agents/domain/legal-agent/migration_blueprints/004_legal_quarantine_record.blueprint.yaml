    constraint_notes: "NOT NULL. CHECK IN ('user_pasted_text','other_agent_output','aggregator_content','blog_article_news','unofficial_scraping','RAG_external','memory_external','connector_bypass','unknown')."
    security_notes: null
    firewall_notes: "connector_bypass = violação crítica. Escalada fw-governor obrigatória."

  - name: initial_trust_class
    source_field: initial_trust_class
    conceptual_type: enum
    proposed_db_type: text
    required: true
    nullable: false
    enum_ref: null
    default: "'TRUST-1'"
    constraint_notes: "NOT NULL. CHECK IN ('TRUST-0','TRUST-1'). Somente TRUST-0 e TRUST-1 aqui."
    security_notes: null
    firewall_notes: "TRUST-0 = definitivo (rejected_unusable). TRUST-1 = quarantined_unverified (promovível)."

