gatilhos_de_uso:
- dano observado
- mecanismo de dano desconhecido
- planejamento de END
- RBI
- FFS
- definição de CML
- falha/vazamento
- mudança de serviço
- histórico de processo agressivo
regra: API 571 identifica e caracteriza mecanismos de dano; não é critério único de
  aceitação/rejeição. Para aceitar/reprovar, consultar código de inspeção/construção,
  procedimento aplicável e avaliação FFS quando necessária.
