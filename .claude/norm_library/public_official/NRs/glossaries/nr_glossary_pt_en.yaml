EPI: Equipamento de Proteção Individual; em inglês, PPE - Personal Protective Equipment.
CA: Certificado de Aprovação de EPI.
PLH: Profissional Legalmente Habilitado.
PMTA: Pressão Máxima de Trabalho Admissível.
APR: Análise Preliminar de Risco.
PT: Permissão de Trabalho.
PET: Permissão de Entrada e Trabalho em espaço confinado.
CIPA: Comissão Interna de Prevenção de Acidentes e de Assédio.
Trabalho em altura: Atividade com diferença de nível e risco de queda conforme NR-35.
Espaço confinado: Área não projetada para ocupação humana contínua, com meios limitados
  de entrada/saída e atmosfera/risco conforme NR-33.
Insalubridade: Condição enquadrada por limites de tolerância ou critérios da NR-15
  e anexos.
Asbesto/Amianto: Fibra mineral tratada no Anexo 12 da NR-15.
Benzeno: Agente químico cancerígeno tratado no Anexo 13-A da NR-15.
