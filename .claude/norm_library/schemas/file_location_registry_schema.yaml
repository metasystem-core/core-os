schema_name: file_location_registry_schema
schema_version: "1.0"

file_location_entry:
  file_id: string
  sha256: string
  original_path: string
  current_path: string
  move_session_id: string_or_null
  moved_at: datetime_or_null
  file_role:
    enum:
      - raw_source
      - processed_block
      - index
      - registry
      - log
      - lacuna
      - glossary
      - translation
      - patch
      - report
      - unknown
  norm_code: string_or_null
  norm_version_id: string_or_null
  permission_status: string
  traceability_status:
    enum:
      - complete
      - partial
      - raw_missing
      - blocks_missing
      - not_applicable
  notes: string
